<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Controlled length of stay — hospital discharge optimization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFBF5"/>
      <stop offset="100%" stop-color="#FDF0E2"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5820D"/>
      <stop offset="100%" stop-color="#E8740C"/>
    </linearGradient>
    <linearGradient id="barFaded" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F57C20" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#F57C20" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.2" r="0.8">
      <stop offset="0%" stop-color="#F57C20" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F57C20" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <g stroke="#1a1a1a" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="225" x2="1600" y2="225"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="675" x2="1600" y2="675"/>
  </g>

  <!-- Decorative "LOS trending down" chart, lower-right -->
  <g transform="translate(880, 170)">
    <!-- Chart frame -->
    <rect x="0" y="0" width="640" height="560" rx="24" fill="#ffffff" stroke="#1a1a1a" stroke-opacity="0.05"/>
    <!-- Chart title -->
    <text x="36" y="56" font-family="DM Sans, system-ui, sans-serif" font-size="14" font-weight="700" fill="#888" letter-spacing="1.5">AVG LENGTH OF STAY</text>
    <text x="36" y="108" font-family="Instrument Serif, Georgia, serif" font-size="64" fill="#1a1a1a">4.2 days</text>
    <text x="36" y="142" font-family="DM Sans, system-ui, sans-serif" font-size="15" font-weight="600" fill="#E8740C">▼ 1.1 days vs. baseline</text>

    <!-- Axis baseline -->
    <line x1="36" y1="470" x2="604" y2="470" stroke="#1a1a1a" stroke-opacity="0.08" stroke-width="1"/>

    <!-- Bars -->
    <g>
      <rect x="60"  y="220" width="48" height="250" rx="6" fill="url(#barFaded)"/>
      <rect x="140" y="250" width="48" height="220" rx="6" fill="url(#barFaded)"/>
      <rect x="220" y="280" width="48" height="190" rx="6" fill="url(#barFaded)"/>
      <rect x="300" y="300" width="48" height="170" rx="6" fill="url(#barFaded)"/>
      <rect x="380" y="320" width="48" height="150" rx="6" fill="url(#bar)"/>
      <rect x="460" y="340" width="48" height="130" rx="6" fill="url(#bar)"/>
      <rect x="540" y="360" width="48" height="110" rx="6" fill="url(#bar)"/>
    </g>

    <!-- Trend line -->
    <polyline points="84,235 164,265 244,295 324,315 404,335 484,355 564,375"
              fill="none" stroke="#F57C20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#ffffff" stroke="#F57C20" stroke-width="3">
      <circle cx="84" cy="235" r="5"/>
      <circle cx="164" cy="265" r="5"/>
      <circle cx="244" cy="295" r="5"/>
      <circle cx="324" cy="315" r="5"/>
      <circle cx="404" cy="335" r="5"/>
      <circle cx="484" cy="355" r="5"/>
      <circle cx="564" cy="375" r="5"/>
    </g>

    <!-- Month labels -->
    <g font-family="DM Sans, system-ui, sans-serif" font-size="12" font-weight="500" fill="#bbb" text-anchor="middle">
      <text x="84" y="500">Jan</text>
      <text x="164" y="500">Feb</text>
      <text x="244" y="500">Mar</text>
      <text x="324" y="500">Apr</text>
      <text x="404" y="500">May</text>
      <text x="484" y="500">Jun</text>
      <text x="564" y="500">Jul</text>
    </g>
  </g>

  <!-- Left text block -->
  <g transform="translate(96, 200)">
    <!-- Pill label -->
    <g>
      <rect x="0" y="0" width="230" height="34" rx="17" fill="#FDF0E2"/>
      <circle cx="18" cy="17" r="4" fill="#F57C20"/>
      <text x="30" y="22" font-family="DM Sans, system-ui, sans-serif" font-size="12" font-weight="700" fill="#E8740C" letter-spacing="1.5">HOSPITAL OPERATIONS</text>
    </g>

    <!-- Headline -->
    <text x="0" y="110" font-family="Instrument Serif, Georgia, serif" font-size="72" fill="#1a1a1a">The case for</text>
    <text x="0" y="190" font-family="Instrument Serif, Georgia, serif" font-size="72" fill="#1a1a1a">a controlled</text>
    <text x="0" y="270" font-family="Instrument Serif, Georgia, serif" font-size="72" fill="#F57C20" font-style="italic">length of stay.</text>

    <!-- Underline accent -->
    <rect x="0" y="310" width="120" height="4" rx="2" fill="#F57C20"/>

    <!-- Sub -->
    <text x="0" y="360" font-family="DM Sans, system-ui, sans-serif" font-size="18" font-weight="500" fill="#555">How better LOS management</text>
    <text x="0" y="388" font-family="DM Sans, system-ui, sans-serif" font-size="18" font-weight="500" fill="#555">reshapes hospital performance.</text>
  </g>

  <!-- Brand wordmark, bottom-left -->
  <g transform="translate(96, 800)">
    <circle cx="14" cy="0" r="10" fill="#F57C20"/>
    <text x="34" y="5" font-family="DM Sans, system-ui, sans-serif" font-size="16" font-weight="700" fill="#F57C20" letter-spacing="-0.02em">Clementine Health</text>
  </g>
</svg>
